[build]
  publish = "."

[build.environment]
  GIT_LFS_ENABLED = "true"

[[redirects]]
  from = "/files/LuxClient-Setup-1.0.0.exe"
  to = "/downloads/LuxClient-Setup-latest.exe"
  status = 301
  force = true

[[headers]]
  for = "/downloads/*"
  [headers.values]
    Content-Disposition = "attachment"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"

[[headers]]
  for = "/files/*"
  [headers.values]
    Content-Disposition = "attachment"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"

[[headers]]
  for = "/updates/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"

[[headers]]
  for = "/announcements.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "no-cache"
